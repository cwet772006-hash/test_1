<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #1a1a2e;
    }

    main {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 100%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
      color: #16213e;
    }

    ul {
      list-style: none;
    }

    li {
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      background: #f8f9fc;
      border-radius: 10px;
      border-left: 4px solid #4361ee;
      font-size: 1rem;
      line-height: 1.4;
      transition: background 0.2s;
    }

    li:last-child {
      margin-bottom: 0;
    }

    li:hover {
      background: #eef1f8;
    }
  </style>
</head>
<body>
  <main>
    <h1>ГЕНЕРАТОР Идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи на сегодня</li>
      <li>Контент-план на неделю</li>
    </ul>
  </main>
</body>
</html>
